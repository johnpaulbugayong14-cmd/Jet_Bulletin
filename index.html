<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5CF8k519wiJTFzQ13MRPirTg839TNlIE",
  authDomain: "jetkaiwa-2cbb5.firebaseapp.com",
  projectId: "jetkaiwa-2cbb5",
  storageBucket: "jetkaiwa-2cbb5.firebasestorage.app",
  messagingSenderId: "492138220710",
  appId: "1:492138220710:web:f900266a2def879756b867",
  measurementId: "G-YMFZJJCBZC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postBtn = document.getElementById("postBtn");
const announcementInput = document.getElementById("announcementInput");
const announcementsContainer = document.getElementById("announcements");

postBtn.addEventListener("click", async () => {

    const text = announcementInput.value;

    if(text.trim() === "") return;

    await addDoc(collection(db,"announcements"),{
        message:text,
        time:Date.now()
    });

    announcementInput.value="";
});

const q = query(collection(db,"announcements"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{

    announcementsContainer.innerHTML="";

    snapshot.forEach((doc)=>{
        const data = doc.data();

        const div = document.createElement("div");
        div.className="post";
        div.innerText=data.message;

        announcementsContainer.appendChild(div);
    });

});
</script>

<h2>Create Announcement</h2>

<form id="postForm">

<input type="text" id="title" placeholder="Announcement title" required>
<br>

<textarea id="content" placeholder="Announcement content" required></textarea>
<br>

<input type="date" id="deadline" placeholder="Set deadline">
<br>

<button type="submit">Post Announcement</button>

</form>


<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<h2 id="annTitle"></h2>

<p id="annContent"></p>

<p id="annDeadline"></p>

<button onclick="deleteAnnouncement()">Delete Announcement</button>

</div>

</div>

<div class="modal" id="overdueModal">
<div class="modal-content-overdue">
<div class="overdue-header">
<span class="warning-icon">⚠️</span>
<h2>Overdue!</h2>
</div>
<div class="overdue-list" id="overdueList"></div>
<button class="btn-close-overdue" onclick="closeOverdueModal()">Got it!</button>
</div>
</div>
<button class="logout-btn" onclick="handleLogout()">Logout</button>

</div>
